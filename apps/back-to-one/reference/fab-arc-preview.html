<!DOCTYPE html>
<html lang="en" style="background:#04040a">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAB Arc Preview</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
:root { --bg:#04040a; --text:#dddde8; --muted:#62627a; --accent:#c45adc; --mono:'SF Mono','Fira Code','Menlo',monospace; }
body { background:#04040a; display:flex; gap:40px; padding:40px; flex-wrap:wrap; justify-content:center; align-items:flex-start; min-height:100vh; }
.phone { width:390px; height:844px; border-radius:44px; border:1px solid rgba(255,255,255,0.08); background:#04040a; position:relative; overflow:hidden; box-shadow:0 32px 80px rgba(0,0,0,0.8); flex-shrink:0; }
.phone-label { color:var(--muted); font-family:var(--mono); font-size:11px; text-align:center; margin-bottom:12px; letter-spacing:0.08em; text-transform:uppercase; }
.phone-wrap { display:flex; flex-direction:column; align-items:center; }
.bg-glow { position:absolute; inset:0; pointer-events:none; z-index:0; background:radial-gradient(ellipse 40% 35% at 50% 0%, rgba(196,90,220,0.1) 0%, transparent 100%); }
.overlay { position:absolute; inset:0; background:rgba(4,4,10,0.75); backdrop-filter:blur(2px); z-index:2; }
.slates { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:0 14px; margin-top:8px; }
.slate { border-radius:9px; background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.04); height:120px; }

/*
 * Radius 114px, ty scaled 0.68 — slightly larger radius than before so
 * 48px buttons have clear gaps between them
 *
 * 210°: tx=114*cos(210)=114*-0.866=-99, ty=114*sin(210)*0.68=114*-0.5*0.68=-39
 * 240°: tx=114*-0.5=-57,                ty=114*-0.866*0.68=-67
 * 270°: tx=0,                           ty=114*-1*0.68=-78
 * 300°: tx=57,                          ty=-67
 * 330°: tx=99,                          ty=-39
 *
 * button 48px → offset -24px
 * b1: top:-24-39=-63, left:-24-99=-123
 * b2: top:-24-67=-91, left:-24-57=-81
 * b3: top:-24-78=-102, left:-24
 * b4: top:-24-67=-91, left:-24+57=33
 * b5: top:-24-39=-63, left:-24+99=75
 */

.fab-system { position:absolute; bottom:34px; left:50%; width:0; height:0; z-index:10; }

.main-fab {
  position:absolute; top:-26px; left:-26px;
  width:52px; height:52px; border-radius:50%;
  background:rgba(196,90,220,0.15); backdrop-filter:blur(16px);
  border:1.5px solid rgba(196,90,220,0.45);
  box-shadow:0 4px 20px rgba(196,90,220,0.25), inset 0 1px 0 rgba(255,255,255,0.1);
  display:flex; align-items:center; justify-content:center; z-index:11; cursor:pointer;
  transition:all 0.25s cubic-bezier(0.32,0.72,0,1);
}
.main-fab.open {
  width:44px; height:44px; top:-22px; left:-22px;
  transform:rotate(45deg);
  box-shadow:0 4px 24px rgba(196,90,220,0.45);
  background:rgba(196,90,220,0.2);
}

.branch-opt { position:absolute; display:flex; align-items:center; justify-content:center; }
.b1 { top:-63px;  left:-123px; }
.b2 { top:-91px;  left:-81px;  }
.b3 { top:-102px; left:-24px;  }
.b4 { top:-91px;  left:33px;   }
.b5 { top:-63px;  left:75px;   }

.opt-circle {
  width:48px; height:48px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  border:1px solid; backdrop-filter:blur(16px);
}
</style>
</head>
<body>

<!-- PHONE 1 — OPEN ALL EQUAL -->
<div class="phone-wrap">
<div class="phone-label">fab open · spaced out</div>
<div class="phone">
  <div class="bg-glow"></div>

    <div style="padding:52px 24px 14px;text-align:center;opacity:0.3;"><div style="font-family:var(--mono);font-size:10px;color:rgba(196,90,220,0.55);text-transform:uppercase;letter-spacing:0.18em;margin-bottom:8px;">Origin Point</div><div style="font-family:sans-serif;font-weight:800;font-size:24px;color:rgba(221,221,232,0.6);">Back to One</div></div>
    <div class="slates" style="opacity:0.2;"><div class="slate" style="height:128px;"></div><div class="slate" style="height:128px;"></div><div class="slate"></div><div class="slate"></div></div>
  </div>
  <div class="overlay"></div>
  <div class="fab-system">
    <svg style="position:absolute;transform:translate(-50%,-50%);pointer-events:none;z-index:9;overflow:visible;" width="1" height="1">
      <line x1="0" y1="0" x2="-99" y2="-39" stroke="rgba(196,90,220,0.22)" stroke-width="1" stroke-dasharray="3 3"/>
      <line x1="0" y1="0" x2="-57" y2="-67" stroke="rgba(196,90,220,0.22)" stroke-width="1" stroke-dasharray="3 3"/>
      <line x1="0" y1="0" x2="0"   y2="-78" stroke="rgba(196,90,220,0.22)" stroke-width="1" stroke-dasharray="3 3"/>
      <line x1="0" y1="0" x2="57"  y2="-67" stroke="rgba(196,90,220,0.22)" stroke-width="1" stroke-dasharray="3 3"/>
      <line x1="0" y1="0" x2="99"  y2="-39" stroke="rgba(196,90,220,0.22)" stroke-width="1" stroke-dasharray="3 3"/>
      <circle cx="0" cy="0" r="2.5" fill="rgba(196,90,220,0.4)"/>
    </svg>
    <div class="branch-opt b1"><div class="opt-circle" style="background:rgba(232,160,32,0.1);border-color:rgba(232,160,32,0.3);"><svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M2 5h12M2 8h8M2 11h5" stroke="#e8a020" stroke-width="1.3" stroke-linecap="round"/><path d="M12 9v4M10 11h4" stroke="#e8a020" stroke-width="1.3" stroke-linecap="round"/></svg></div></div>
    <div class="branch-opt b2"><div class="opt-circle" style="background:rgba(100,112,243,0.1);border-color:rgba(100,112,243,0.3);"><svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M8 2L10.5 6.5H13.5L11 9.5L12 13.5L8 11L4 13.5L5 9.5L2.5 6.5H5.5L8 2Z" stroke="#6470f3" stroke-width="1.2" stroke-linejoin="round"/></svg></div></div>
    <div class="branch-opt b3"><div class="opt-circle" style="background:rgba(0,184,148,0.1);border-color:rgba(0,184,148,0.3);"><svg width="18" height="18" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="11" rx="1.5" stroke="#00b894" stroke-width="1.2"/><path d="M5 2v2M11 2v2" stroke="#00b894" stroke-width="1.2" stroke-linecap="round"/><path d="M2 7h12" stroke="#00b894" stroke-width="1"/><rect x="5" y="9" width="2" height="2" rx="0.5" fill="#00b894" opacity="0.7"/><rect x="9" y="9" width="2" height="2" rx="0.5" fill="#00b894" opacity="0.7"/></svg></div></div>
    <div class="branch-opt b4"><div class="opt-circle" style="background:rgba(74,184,232,0.1);border-color:rgba(74,184,232,0.3);"><svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M2 2.5h10a1 1 0 011 1v5a1 1 0 01-1 1H5L2 12V3.5a1 1 0 010-1z" stroke="#4ab8e8" stroke-width="1.1" stroke-linejoin="round"/><path d="M5 6.5h6a1 1 0 011 1V10l-2-1H6a1 1 0 01-1-1V6.5" stroke="#4ab8e8" stroke-width="1" stroke-linejoin="round" opacity="0.6"/></svg></div></div>
    <div class="branch-opt b5"><div class="opt-circle" style="background:rgba(232,196,74,0.1);border-color:rgba(232,196,74,0.3);"><svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M9 2L4 9h4l-1 5L14 7h-4l-1-5z" stroke="#e8c44a" stroke-width="1.3" stroke-linejoin="round"/></svg></div></div>
    <div class="main-fab open"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2V14M2 8H14" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round"/></svg></div>
  </div>
</div>
</div>


<!-- PHONE 2 — PANEL + ARC -->

<div class="phone">

      <div style="display:flex;gap:4px;align-items:center;"><div style="width:14px;height:4px;border-radius:2px;background:#e8a020;"></div><div style="width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.12);"></div><div style="width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.12);"></div><div style="width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.12);"></div><div style="width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.12);"></div></div>
    </div>
    <div style="padding:12px 18px;display:flex;flex-direction:column;gap:9px;overflow:hidden;">
      <div style="display:flex;align-items:center;gap:10px;padding-bottom:9px;border-bottom:1px solid rgba(255,255,255,0.04);"><div style="width:17px;height:17px;border-radius:50%;border:1.5px solid rgba(232,86,74,0.5);background:rgba(232,86,74,0.08);flex-shrink:0;"></div><div><div style="font-family:sans-serif;font-size:13px;color:rgba(221,221,232,0.9);">Hire VFX Supervisor</div><div style="display:flex;gap:6px;margin-top:3px;"><span style="font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:20px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:var(--muted);">Drifting</span><span style="font-family:var(--mono);font-size:9px;color:#e8564a;">3 days late</span></div></div></div>

      <line x1="0" y1="0" x2="-57" y2="-67" stroke="rgba(196,90,220,0.1)"   stroke-width="1" stroke-dasharray="3 3"/>

      <line x1="0" y1="0" x2="99"  y2="-39" stroke="rgba(196,90,220,0.1)"   stroke-width="1" stroke-dasharray="3 3"/>

    <div class="branch-opt b1"><div class="opt-circle" style="background:rgba(232,160,32,0.18);border-color:rgba(232,160,32,0.55);box-shadow:0 0 16px rgba(232,160,32,0.3);"><svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M2 5h12M2 8h8M2 11h5" stroke="#e8a020" stroke-width="1.3" stroke-linecap="round"/><path d="M12 9v4M10 11h4" stroke="#e8a020" stroke-width="1.3" stroke-linecap="round"/></svg></div></div>

</body>
