<!DOCTYPE html>
<html lang="en" style="background:#04040a">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hub FAB Expanded</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background:#04040a;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  color:#dddde8;
  display:flex; flex-direction:column; align-items:center;
  padding:28px 0 48px; gap:12px;
}
.hint { font-family:'SF Mono','Menlo',monospace; font-size:11px; color:#62627a; letter-spacing:0.08em; text-transform:uppercase; }

.phone {
  width:320px; height:560px;
  border-radius:36px; border:1px solid rgba(255,255,255,0.08);
  background:#04040a; position:relative; overflow:hidden;
}

/* glow bg */
.bg-glow {
  position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse 60% 80% at 50% 0%, rgba(196,90,220,0.07) 0%, transparent 65%),
    linear-gradient(90deg, rgba(0,0,0,0.4) 0%, transparent 28%, transparent 72%, rgba(0,0,0,0.4) 100%);
}

/* fake hub content */
.fake-content { position:absolute; top:0; left:0; right:0; z-index:2; padding:20px 14px 0; display:flex; flex-direction:column; gap:11px; }
.fake-topbar { height:72px; background:linear-gradient(180deg,rgba(196,90,220,0.1) 0%,transparent 100%); border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding-top:8px; }
.fake-proj { font-weight:800; font-size:0.9rem; color:rgba(221,221,232,0.6); letter-spacing:-0.02em; }
.fake-meta { font-family:'SF Mono','Menlo',monospace; font-size:0.36rem; color:rgba(100,112,243,0.7); letter-spacing:0.08em; text-transform:uppercase; }
.fake-card { height:68px; background:#0a0a12; border:1px solid rgba(255,255,255,0.05); border-radius:9px; opacity:0.5; }
.fake-card-sm { height:40px; background:#0a0a12; border:1px solid rgba(255,255,255,0.05); border-radius:9px; opacity:0.35; }
.fade { position:absolute; bottom:0; left:0; right:0; height:180px; background:linear-gradient(transparent, #04040a 55%); z-index:3; }

/* overlay */
.overlay {
  position:absolute; inset:0; z-index:20;
  background:rgba(4,4,10,0.75); backdrop-filter:blur(5px);
  opacity:0; pointer-events:none;
  transition:opacity 0.28s ease; border-radius:36px;
}
.overlay.open { opacity:1; pointer-events:all; }

/* FAB zone */
.fab-zone {
  position:absolute; bottom:28px; left:0; right:0; z-index:30;
  display:flex; align-items:center; justify-content:center;
  height:52px;
}

/* side FABs */
.side-fab {
  position:absolute;
  width:34px; height:34px; border-radius:50%;
  background:#0e0e18; border:1px solid rgba(255,255,255,0.08);
  display:flex; align-items:center; justify-content:center;
  top:50%; left:50%;
  opacity:0; pointer-events:none; cursor:pointer;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s ease;
}
.side-fab.chat    { transform:translate(-50%,-50%); }
.side-fab.threads { transform:translate(-50%,-50%); }
.side-fab.chat.open    { opacity:1; pointer-events:all; transform:translate(calc(-50% - 104px),-50%); }
.side-fab.threads.open { opacity:1; pointer-events:all; transform:translate(calc(-50% + 104px),-50%); }
.unread-dot { position:absolute; top:-1px; right:-1px; width:8px; height:8px; border-radius:50%; background:#4ab8e8; border:1.5px solid #04040a; }

/* main FAB */
.main-fab {
  width:52px; height:52px; border-radius:50%;
  background:#c45adc; border:none;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 24px rgba(196,90,220,0.45);
  cursor:pointer; position:relative; z-index:31; flex-shrink:0;
  transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
}
.main-fab.open { transform:rotate(45deg); box-shadow:0 6px 36px rgba(196,90,220,0.65); }

/* branch options */
.options-wrap {
  position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:0; height:0; z-index:30; pointer-events:none;
}

.opt {
  position:absolute;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  opacity:0; pointer-events:none;
  transition: opacity 0.22s ease, transform 0.32s cubic-bezier(0.34,1.56,0.64,1);
}
.opt.open { opacity:1; pointer-events:all; }

/* 3 branches — symmetric fan */
.opt.left   { bottom:26px; left:-90px;  transform:translateY(20px); }
.opt.center { bottom:90px; left:-22px;  transform:translateY(30px); }
.opt.right  { bottom:26px; left:46px;   transform:translateY(20px); }

.opt.left.open   { transform:translateY(0); transition-delay:0s; }
.opt.center.open { transform:translateY(0); transition-delay:0.05s; }
.opt.right.open  { transform:translateY(0); transition-delay:0s; }

.opt-circle {
  width:46px; height:46px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  border:1px solid; flex-shrink:0;
  transition:transform 0.15s ease;
}
.opt-circle:active { transform:scale(0.95); }
.opt-circle svg { display:block; flex-shrink:0; }

.opt-label {
  font-family:'SF Mono','Menlo',monospace;
  font-size:0.38rem; letter-spacing:0.06em; text-transform:uppercase;
  white-space:nowrap;
}

/* branch lines */
.branches-svg {
  position:absolute; bottom:26px; left:50%; transform:translateX(-50%);
  z-index:28; pointer-events:none;
  opacity:0; transition:opacity 0.2s ease;
}
.branches-svg.open { opacity:1; }
</style>
</head>
<body>

<div class="hint">Tap the plus</div>

<div class="phone">
  <div class="bg-glow"></div>

  <!-- fake hub content -->
  <div class="fake-content">
    <div class="fake-topbar">
      <div class="fake-proj">Drifting</div>
      <div class="fake-meta">Narrative Short · In Production</div>
    </div>
    <div class="fake-card"></div>
    <div class="fake-card"></div>
    <div class="fake-card-sm"></div>
  </div>
  <div class="fade"></div>

  <!-- overlay -->
  <div class="overlay" id="overlay" onclick="closeFab()"></div>

  <!-- branch lines -->
  <svg class="branches-svg" id="branches" width="220" height="110" viewBox="0 0 220 110">
    <line x1="110" y1="98" x2="22"  y2="46" stroke="rgba(196,90,220,0.2)" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="110" y1="98" x2="110" y2="8"  stroke="rgba(196,90,220,0.2)" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="110" y1="98" x2="198" y2="46" stroke="rgba(196,90,220,0.2)" stroke-width="1" stroke-dasharray="3 3"/>
    <circle cx="110" cy="98" r="3" fill="rgba(196,90,220,0.35)"/>
  </svg>

  <!-- options -->
  <div class="options-wrap">

    <!-- LEFT: Action Item -->
    <div class="opt left" id="opt-left" onclick="closeFab()">
      <div class="opt-circle" style="background:rgba(232,160,32,0.1); border-color:rgba(232,160,32,0.3);">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="7" stroke="#e8a020" stroke-width="1.3"/>
          <path d="M5.5 9L8 11.5L12.5 6.5" stroke="#e8a020" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="opt-label" style="color:#e8a020;">Action</span>
    </div>

    <!-- CENTER: Milestone -->
    <div class="opt center" id="opt-center" onclick="closeFab()">
      <div class="opt-circle" style="background:rgba(196,90,220,0.12); border-color:rgba(196,90,220,0.35);">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <line x1="2" y1="9" x2="16" y2="9" stroke="#c45adc" stroke-width="1.3"/>
          <circle cx="6" cy="9" r="2.5" fill="#c45adc"/>
          <circle cx="12" cy="9" r="2.5" fill="#c45adc"/>
        </svg>
      </div>
      <span class="opt-label" style="color:#c45adc;">Milestone</span>
    </div>

    <!-- RIGHT: Creative -->
    <div class="opt right" id="opt-right" onclick="closeFab()">
      <div class="opt-circle" style="background:rgba(100,112,243,0.1); border-color:rgba(100,112,243,0.3);">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="2" y="3" width="14" height="12" rx="1.5" stroke="#6470f3" stroke-width="1.3"/>
          <path d="M2 7.5H16" stroke="#6470f3" stroke-width="1.3"/>
          <path d="M6.5 3V7.5M11.5 3V7.5" stroke="#6470f3" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="opt-label" style="color:#6470f3;">Creative</span>
    </div>

  </div>

  <!-- FAB zone -->
  <div class="fab-zone">

    <!-- Chat FAB left -->
    <div class="side-fab chat" id="sf-chat">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" style="display:block;">
        <path d="M2 2h11a1 1 0 011 1v6a1 1 0 01-1 1H5.5l-3.5 3V3a1 1 0 011-1z" stroke="rgba(255,255,255,0.45)" stroke-width="1.2" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Main FAB -->
    <div class="main-fab" id="main-fab" onclick="toggleFab()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="display:block;">
        <path d="M9 3V15M3 9H15" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- Threads FAB right -->
    <div class="side-fab threads" id="sf-threads">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" style="display:block;">
        <path d="M2.5 2.5h10a1 1 0 011 1v5a1 1 0 01-1 1H6l-3.5 3V3.5a1 1 0 011-1z" stroke="rgba(255,255,255,0.45)" stroke-width="1.2" stroke-linejoin="round"/>
      </svg>
      <div class="unread-dot"></div>
    </div>

  </div>
</div>

<script>
let open = false;

function toggleFab() {
  open = !open;
  document.getElementById('main-fab').classList.toggle('open', open);
  document.getElementById('overlay').classList.toggle('open', open);
  document.getElementById('branches').classList.toggle('open', open);
  ['left','center','right'].forEach(id => document.getElementById('opt-'+id).classList.toggle('open', open));
  document.getElementById('sf-chat').classList.toggle('open', open);
  document.getElementById('sf-threads').classList.toggle('open', open);
}

function closeFab() {
  open = false;
  document.getElementById('main-fab').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('branches').classList.remove('open');
  ['left','center','right'].forEach(id => document.getElementById('opt-'+id).classList.remove('open'));
  document.getElementById('sf-chat').classList.remove('open');
  document.getElementById('sf-threads').classList.remove('open');
}
</script>
</body>
</html>
