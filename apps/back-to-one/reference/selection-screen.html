<!DOCTYPE html>
<html lang="en" style="background:#04040a">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Back to One — Select Project</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#04040a; --card:#0a0a12; --border:rgba(255,255,255,0.05);
  --text:#dddde8; --text2:#a0a0b8; --muted:#62627a;
  --accent:#c45adc; --danger:#e8564a;
  --mono:'SF Mono','Fira Code','Menlo',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
}
html,body { height:100%; }
body { background:#04040a; font-family:var(--sans); color:var(--text); min-height:100vh; overflow-x:hidden; }

/* SPACE BG */
.space-bg { position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0; }
.nebula { position:absolute; top:18%; left:12%; width:260px; height:120px; background:radial-gradient(ellipse at 40% 50%, rgba(180,200,220,0.12) 0%, rgba(120,160,200,0.05) 35%, transparent 70%); transform:rotate(-22deg); filter:blur(14px); }
.nebula2 { position:absolute; top:60%; left:35%; width:200px; height:80px; background:radial-gradient(ellipse, rgba(150,170,200,0.07) 0%, transparent 70%); filter:blur(10px); }
.bk { position:absolute; border-radius:50%; filter:blur(3px); }
.star { position:absolute; border-radius:50%; background:white; }

/* CONTENT */
.content { position:relative; z-index:1; max-width:390px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }

/* HEADER */
.hdr { display:flex; align-items:flex-start; justify-content:space-between; padding:56px 20px 18px; }
.hdr-title { font-weight:800; font-size:1.5rem; color:var(--text); letter-spacing:-0.03em; line-height:1; }
.hdr-sub { font-family:var(--mono); font-size:0.44rem; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; margin-top:5px; }

/* SLATES GRID */
.slates-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 14px 40px; }

/* SLATE */
.slate { width:100%; aspect-ratio:16/9; border-radius:7px; overflow:hidden; position:relative; cursor:pointer; display:flex; flex-direction:column; transition:transform 0.12s ease; user-select:none; }
.slate.pressing { transform:scale(0.96); filter:brightness(0.85); }

/* CLAPPER */
.clapper { height:16px; flex-shrink:0; position:relative; overflow:hidden; }
.clapper svg { position:absolute; inset:0; width:100%; height:100%; }

/* BODY */
.sb { flex:1; display:flex; flex-direction:column; justify-content:space-between; padding:7px 8px; position:relative; overflow:hidden; }
.sb::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 9px,rgba(255,255,255,0.02) 9px,rgba(255,255,255,0.02) 10px); pointer-events:none; }
.s-type { font-family:var(--mono); font-size:0.36rem; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:2px; }
.s-name { font-weight:800; font-size:0.82rem; color:var(--text); letter-spacing:-0.02em; line-height:1.1; }
.s-bottom { display:flex; align-items:flex-end; justify-content:space-between; }
.s-phase { display:inline-flex; align-items:center; gap:3px; padding:2px 5px; border-radius:3px; }
.s-pdot { width:3px; height:3px; border-radius:50%; flex-shrink:0; }
.s-plbl { font-family:var(--mono); font-size:0.34rem; letter-spacing:0.07em; text-transform:uppercase; }
.s-crew { display:flex; }
.s-av { width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:0.3rem; font-weight:600; border:1px solid rgba(0,0,0,0.5); margin-left:-4px; }
.s-av:first-child { margin-left:0; }
.s-milestone { font-family:var(--mono); font-size:0.32rem; color:rgba(255,255,255,0.28); letter-spacing:0.04em; margin-top:3px; }
.s-milestone.urgent { color:#e8a020; }

/* NEW PROJECT */
.new-slate { width:100%; aspect-ratio:16/9; border-radius:7px; border:1.5px dashed rgba(255,255,255,0.1); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; cursor:pointer; transition:all 0.15s; }
.new-slate:hover { border-color:rgba(255,255,255,0.2); }
.new-icon { width:22px; height:22px; border-radius:50%; border:1.5px dashed rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; }
.new-lbl { font-family:var(--mono); font-size:0.38rem; color:rgba(255,255,255,0.2); letter-spacing:0.08em; text-transform:uppercase; }

/* OVERLAY */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(3px); z-index:100; opacity:0; pointer-events:none; transition:opacity 0.25s; }
.overlay.op { opacity:1; pointer-events:all; }

/* ACTION SHEET */
.action-sheet { position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(110%); width:100%; max-width:390px; background:#111118; border-top:1px solid rgba(255,255,255,0.07); border-radius:20px 20px 0 0; z-index:101; transition:transform 0.3s cubic-bezier(0.32,0.72,0,1); padding-bottom:36px; }
.action-sheet.op { transform:translateX(-50%) translateY(0); }
.sheet-handle { width:36px; height:4px; border-radius:2px; background:rgba(255,255,255,0.1); margin:12px auto 4px; }
.sheet-identity { display:flex; align-items:center; gap:10px; padding:10px 18px 12px; border-bottom:1px solid rgba(255,255,255,0.05); }
.sheet-swatch { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.sheet-proj-name { font-weight:700; font-size:0.85rem; color:var(--text); flex:1; }
.sheet-proj-client { font-family:var(--mono); font-size:0.42rem; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; }

.action-row { display:flex; align-items:center; gap:12px; padding:11px 18px; cursor:pointer; transition:background 0.12s; }
.action-row:hover { background:rgba(255,255,255,0.03); }
.action-icon { width:30px; height:30px; border-radius:7px; display:flex; align-items:center; justify-content:center; flex-shrink:0; background:rgba(255,255,255,0.05); }
.action-label { font-weight:600; font-size:0.78rem; color:var(--text); }
.action-sub { font-family:var(--mono); font-size:0.38rem; color:var(--muted); letter-spacing:0.04em; margin-top:1px; }
.action-row.danger .action-label { color:var(--danger); }
.action-chev { opacity:0.2; margin-left:auto; flex-shrink:0; }
.sheet-divider { height:1px; background:rgba(255,255,255,0.05); margin:4px 0; }

/* COLOR SECTION */
.color-section { padding:8px 18px 6px; }
.color-section-hdr { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.color-grid { display:grid; grid-template-columns:repeat(9,1fr); gap:7px; }
.color-chip { width:100%; aspect-ratio:1; border-radius:50%; cursor:pointer; transition:transform 0.12s; border:2px solid transparent; }
.color-chip.active { border-color:rgba(255,255,255,0.55); transform:scale(1.18); }
.color-chip:hover { transform:scale(1.1); }

/* CONFIRM SHEET */
.confirm-sheet { position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(110%); width:100%; max-width:390px; background:#111118; border-top:1px solid rgba(255,255,255,0.07); border-radius:20px 20px 0 0; z-index:102; transition:transform 0.3s cubic-bezier(0.32,0.72,0,1); padding:0 0 36px; text-align:center; }
.confirm-sheet.op { transform:translateX(-50%) translateY(0); }
.confirm-title { font-weight:800; font-size:1rem; color:var(--text); padding:24px 24px 6px; }
.confirm-sub { font-family:var(--mono); font-size:0.48rem; color:var(--muted); letter-spacing:0.04em; padding:0 24px 20px; line-height:1.6; }
.confirm-btns { display:flex; gap:10px; padding:0 18px; }
.confirm-btn { flex:1; padding:13px; border-radius:8px; border:none; font-weight:700; font-size:0.78rem; cursor:pointer; font-family:var(--sans); transition:all 0.15s; }
.confirm-btn.cancel { background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--text2); }
.confirm-btn.go { background:rgba(232,86,74,0.12); border:1px solid rgba(232,86,74,0.25); color:var(--danger); }

/* RENAME SHEET */
.rename-sheet { position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(110%); width:100%; max-width:390px; background:#111118; border-top:1px solid rgba(255,255,255,0.07); border-radius:20px 20px 0 0; z-index:102; transition:transform 0.3s cubic-bezier(0.32,0.72,0,1); padding-bottom:36px; }
.rename-sheet.op { transform:translateX(-50%) translateY(0); }
.rename-hdr { display:flex; align-items:center; justify-content:space-between; padding:18px 18px 14px; border-bottom:1px solid var(--border); }
.rename-title { font-weight:800; font-size:0.9rem; color:var(--text); }
.rename-save { font-family:var(--mono); font-size:0.48rem; color:var(--accent); letter-spacing:0.06em; text-transform:uppercase; padding:5px 10px; border-radius:20px; background:rgba(196,90,220,0.1); border:1px solid rgba(196,90,220,0.25); cursor:pointer; }
.rename-fields { padding:16px 18px; display:flex; flex-direction:column; gap:14px; }
.rename-field label { font-family:var(--mono); font-size:0.44rem; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; display:block; margin-bottom:6px; }
.rename-input { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:7px; padding:10px 12px; color:var(--text); font-family:var(--sans); font-size:0.82rem; outline:none; transition:border-color 0.15s; }
.rename-input:focus { border-color:rgba(196,90,220,0.4); }
</style>
</head>

<script>
const COLORS = [
  // Original 9
  { hex:'#c45adc', name:'Violet' },
  { hex:'#e8564a', name:'Crimson' },
  { hex:'#4ab8e8', name:'Sky' },
  { hex:'#e8c44a', name:'Gold' },
  { hex:'#e87a4a', name:'Ember' },
  { hex:'#4ae8a0', name:'Mint' },
  { hex:'#e84a9a', name:'Rose' },
  { hex:'#7ae84a', name:'Lime' },
  { hex:'#4a6ae8', name:'Cobalt' },
  // New 9
  { hex:'#a06ae8', name:'Lavender' },
  { hex:'#c87848', name:'Rust' },
  { hex:'#4ad8c8', name:'Teal' },
  { hex:'#e8b06a', name:'Peach' },
  { hex:'#e840b8', name:'Fuchsia' },
  { hex:'#c0e84a', name:'Chartreuse' },
  { hex:'#5a8ae8', name:'Steel' },
  { hex:'#e8d87a', name:'Sand' },
  { hex:'#e8a0c0', name:'Blush' },
];

const PROJECTS = [
  {
    id:'proj-drifting-001', name:'Drifting', client:'Origin Point', type:'Narrative Short',
    color:'#c45adc', phase:'prod', phaseLabel:'Production', phaseColor:'#6470f3',
    crew:[{i:'CL',c:'#c45adc'},{i:'JR',c:'#a0a0b8'},{i:'SK',c:'#a0a0b8'},{i:'+2',c:'#62627a'}],
    milestone:'↑ Shoot in 14d', urgent:true,
    bg:'linear-gradient(135deg,#100a18,#0a0810)',
  },
  {
    id:'proj-lumina-001', name:'Astra Lumina', client:'Origin Point', type:'Commercial',
    color:'#e8c44a', phase:'pre', phaseLabel:'Pre-prod', phaseColor:'#e8a020',
    crew:[{i:'CL',c:'#e8c44a'},{i:'JR',c:'#a0a0b8'},{i:'PS',c:'#a0a0b8'}],
    milestone:'Treatment approved', urgent:false,
    bg:'linear-gradient(135deg,#120f06,#0e0b04)',
  },
  {
    id:'proj-freehand-001', name:'Freehand', client:'Art is Free', type:'Documentary',
    color:'#4ab8e8', phase:'post', phaseLabel:'Post-prod', phaseColor:'#00b894',
    crew:[{i:'CL',c:'#4ab8e8'},{i:'SK',c:'#a0a0b8'},{i:'MO',c:'#a0a0b8'}],
    milestone:'Rough cut review', urgent:false,
    bg:'linear-gradient(135deg,#04101a,#030c12)',
  },
];

let activeProject = null;
let pressTimer = null;
let touchMoved = false;

function hexToRgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function makeClapperSVG(color, id) {
  const dark = `#${Math.max(0,parseInt(color.slice(1,3),16)-80).toString(16).padStart(2,'0')}${Math.max(0,parseInt(color.slice(3,5),16)-80).toString(16).padStart(2,'0')}${Math.max(0,parseInt(color.slice(5,7),16)-80).toString(16).padStart(2,'0')}`;
  const c = hexToRgba(color, 0.26);
  return `<svg viewBox="0 0 160 16" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="cp-${id}" x="0" y="0" width="32" height="16" patternUnits="userSpaceOnUse">
        <rect width="32" height="16" fill="${dark}"/>
        <polygon points="0,0 16,0 0,16" fill="${c}"/>
        <polygon points="32,0 32,16 16,16" fill="${c}"/>
      </pattern>
    </defs>
    <rect width="160" height="16" fill="url(#cp-${id})"/>
    <rect width="160" height="1.5" fill="rgba(255,255,255,0.08)"/>
    <rect y="14.5" width="160" height="1.5" fill="${hexToRgba(color,0.5)}"/>
    <circle cx="10" cy="8" r="3" fill="${dark}" stroke="${hexToRgba(color,0.25)}" stroke-width="0.8"/>
    <circle cx="150" cy="8" r="3" fill="${dark}" stroke="${hexToRgba(color,0.25)}" stroke-width="0.8"/>
  </svg>`;
}

function renderSlates() {
  const grid = document.getElementById('slates-grid');
  grid.innerHTML = '';

  PROJECTS.forEach((p,i) => {
    const slate = document.createElement('div');
    slate.className = 'slate';
    slate.id = 'slate-' + p.id;

    const crewHtml = p.crew.map(c =>
      `<div class="s-av" style="background:${hexToRgba(p.color,0.12)};color:${c.c};">${c.i}</div>`
    ).join('');

    slate.innerHTML = `
      <div class="clapper">${makeClapperSVG(p.color, i)}</div>
      <div class="sb" style="background:${p.bg}">
        <div>
          <div class="s-type" style="color:${hexToRgba(p.color,0.55)}">${p.type}</div>
          <div class="s-name">${p.name}</div>
        </div>
        <div>
          <div class="s-bottom">
            <div class="s-phase" style="background:${hexToRgba(p.phaseColor,0.12)}">
              <div class="s-pdot" style="background:${p.phaseColor};box-shadow:0 0 3px ${p.phaseColor};"></div>
              <span class="s-plbl" style="color:${p.phaseColor}">${p.phaseLabel}</span>
            </div>
            <div class="s-crew">${crewHtml}</div>
          </div>
          <div class="s-milestone${p.urgent?' urgent':''}">${p.milestone}</div>
        </div>
      </div>`;

    // long press
    slate.addEventListener('touchstart', e => {
      touchMoved = false;
      slate.classList.add('pressing');
      pressTimer = setTimeout(() => {
        if (!touchMoved) { slate.classList.remove('pressing'); openActionSheet(p); }
      }, 500);
    }, { passive:true });
    slate.addEventListener('touchmove', () => { touchMoved = true; clearTimeout(pressTimer); slate.classList.remove('pressing'); }, { passive:true });
    slate.addEventListener('touchend', () => { clearTimeout(pressTimer); slate.classList.remove('pressing'); });
    slate.addEventListener('click', () => { if (!touchMoved) openActionSheet(p); }); // desktop fallback

    grid.appendChild(slate);
  });

  // New project tile
  const newTile = document.createElement('div');
  newTile.className = 'new-slate';
  newTile.innerHTML = `<div class="new-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M5 1V9M1 5H9" stroke="rgba(255,255,255,0.28)" stroke-width="1.3" stroke-linecap="round"/></svg></div><span class="new-lbl">New Project</span>`;
  grid.appendChild(newTile);
}

function openActionSheet(p) {
  activeProject = p;
  document.getElementById('sheet-swatch').style.cssText = `background:${p.color};box-shadow:0 0 6px ${hexToRgba(p.color,0.5)};`;
  document.getElementById('sheet-name').textContent = p.name;
  document.getElementById('sheet-client').textContent = p.client;

  // Color grid
  const grid = document.getElementById('color-grid');
  grid.innerHTML = '';
  COLORS.forEach(c => {
    const chip = document.createElement('div');
    chip.className = 'color-chip' + (c.hex === p.color ? ' active' : '');
    chip.style.background = c.hex;
    chip.title = c.name;
    chip.addEventListener('click', () => {
      document.querySelectorAll('.color-chip').forEach(x => x.classList.remove('active'));
      chip.classList.add('active');
      p.color = c.hex;
      renderSlates();
      document.getElementById('sheet-swatch').style.cssText = `background:${c.hex};box-shadow:0 0 6px ${hexToRgba(c.hex,0.5)};`;
    });
    grid.appendChild(chip);
  });

  document.getElementById('overlay').classList.add('op');
  document.getElementById('action-sheet').classList.add('op');
}

function openRename() {
  if (!activeProject) return;
  document.getElementById('rename-project').value = activeProject.name;
  document.getElementById('rename-client').value = activeProject.client;
  document.getElementById('rename-sheet').classList.add('op');
  setTimeout(() => document.getElementById('rename-project').focus(), 350);
}

function saveRename() {
  if (!activeProject) return;
  const name = document.getElementById('rename-project').value.trim();
  const client = document.getElementById('rename-client').value.trim();
  if (name) { activeProject.name = name; activeProject.client = client || activeProject.client; }
  document.getElementById('rename-sheet').classList.remove('op');
  renderSlates();
  openActionSheet(activeProject);
}

function confirmArchive() {
  document.getElementById('confirm-title').textContent = `Archive "${activeProject?.name}"?`;
  document.getElementById('confirm-sub').textContent = 'Project will be hidden from active view. You can restore it from settings.';
  document.getElementById('confirm-go').textContent = 'Archive';
  document.getElementById('confirm-go').style.color = '#e8a020';
  document.getElementById('confirm-go').style.background = 'rgba(232,160,32,0.1)';
  document.getElementById('confirm-go').style.borderColor = 'rgba(232,160,32,0.25)';
  document.getElementById('confirm-go').onclick = () => { closeAll(); };
  document.getElementById('confirm-sheet').classList.add('op');
}

function confirmDelete() {
  document.getElementById('confirm-title').textContent = `Delete "${activeProject?.name}"?`;
  document.getElementById('confirm-sub').textContent = 'All data will be permanently removed.\nThis cannot be undone.';
  document.getElementById('confirm-go').textContent = 'Delete forever';
  document.getElementById('confirm-go').style.color = '#e8564a';
  document.getElementById('confirm-go').style.background = 'rgba(232,86,74,0.1)';
  document.getElementById('confirm-go').style.borderColor = 'rgba(232,86,74,0.25)';
  document.getElementById('confirm-go').onclick = () => { closeAll(); };
  document.getElementById('confirm-sheet').classList.add('op');
}

function closeConfirm() { document.getElementById('confirm-sheet').classList.remove('op'); }

function closeAll() {
  document.getElementById('overlay').classList.remove('op');
  document.getElementById('action-sheet').classList.remove('op');
  document.getElementById('confirm-sheet').classList.remove('op');
  document.getElementById('rename-sheet').classList.remove('op');
  activeProject = null;
}

renderSlates();
</script>
</body>
</html>
