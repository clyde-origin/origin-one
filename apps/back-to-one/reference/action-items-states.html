<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Action Items — States</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #04040a; --card-bg: #0a0a12; --card-border: rgba(255,255,255,0.05);
    --text: #dddde8; --text2: #a0a0b8; --muted: #62627a; --accent: #c45adc; --radius: 9px;
  }
  body {
    background: var(--bg); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 28px 0 48px; font-family: 'Manrope', sans-serif;
  }
  .hub-frame { width: 358px; display: flex; flex-direction: column; gap: 32px; }

  .state-label {
    font-family: 'DM Mono', monospace; font-size: 0.48rem; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px;
  }

  .module { display: flex; flex-direction: column; gap: 8px; }
  .module-header { display: flex; align-items: center; gap: 6px; padding: 0 2px; }
  .module-icon { opacity: 0.45; flex-shrink: 0; }
  .module-name { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 0.8rem; color: var(--text); flex: 1; }
  .module-meta { font-family: 'DM Mono', monospace; font-size: 0.44rem; color: var(--muted); letter-spacing: 0.06em; }
  .module-chevron { opacity: 0.2; flex-shrink: 0; }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    overflow: visible; /* allow FAB to sit on edge */
    display: flex;
    flex-direction: column;
    height: 148px;
    position: relative;
  }

  /* Mini FAB — circle plus bottom right */
  .add-fab {
    position: absolute;
    bottom: -14px;
    right: 12px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #14101a;
    border: 1.5px solid rgba(196,90,220,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
    z-index: 10;
  }
  .add-fab:hover {
    border-color: rgba(196,90,220,0.8);
    background: rgba(196,90,220,0.12);
    transform: scale(1.1);
  }
  .add-fab:hover .plus-path { stroke: var(--accent); }
  .plus-path { transition: stroke 0.15s ease; }

  /* TASK ROWS */
  .task-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px; border-bottom: 1px solid var(--card-border);
  }
  .task-row:last-of-type { border-bottom: none; }
  .checkbox {
    width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid;
    flex-shrink: 0; margin-top: 1px;
  }
  .checkbox.mine { border-color: var(--accent); }
  .checkbox.other { border-color: var(--muted); }
  .task-body { flex: 1; min-width: 0; }
  .task-name { font-size: 0.72rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
  .task-name.mine { color: var(--text); }
  .task-name.other { color: var(--muted); }
  .task-meta { font-family: 'DM Mono', monospace; font-size: 0.52rem; margin-top: 2px; letter-spacing: 0.03em; color: var(--muted); }
  .task-assignee { font-family: 'DM Mono', monospace; font-size: 0.48rem; color: var(--muted); opacity: 0.6; margin-top: 1px; }

  /* EMPTY */
  .empty-body {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; text-align: center; padding: 0 16px;
  }
  .empty-icon-wrap { position: relative; width: 34px; height: 34px; flex-shrink: 0; }
  .empty-icon-bg {
    position: absolute; inset: 0; border-radius: 50%;
    background: rgba(196,90,220,0.08); border: 1px solid rgba(196,90,220,0.15);
  }
  .empty-icon-wrap svg { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .empty-headline { font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 0.8rem; color: var(--text); letter-spacing: -0.01em; }
  .empty-sub { font-family: 'DM Mono', monospace; font-size: 0.48rem; color: var(--muted); letter-spacing: 0.03em; line-height: 1.6; }

  @keyframes ring-pulse {
    0% { transform: scale(1); opacity: 0.4; }
    70% { transform: scale(1.65); opacity: 0; }
    100% { transform: scale(1.65); opacity: 0; }
  }
  .pulse-ring {
    position: absolute; inset: 0; border-radius: 50%;
    border: 1px solid rgba(196,90,220,0.3);
    animation: ring-pulse 2.4s ease-out infinite;
  }
</style>
</head>
<body>

<div class="hub-frame">

  <!-- FILLED -->
  <div>
    <div class="state-label">Filled state</div>
    <div class="module">
      <div class="module-header">
        <svg class="module-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
          <circle cx="6.5" cy="6.5" r="5.5" stroke="white" stroke-width="1.2"/>
          <path d="M4 6.5L6 8.5L9 5" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="module-name">Action Items</span>
        <span class="module-meta">3 OPEN</span>
        <svg class="module-chevron" width="7" height="11" viewBox="0 0 7 11" fill="none">
          <path d="M1.5 1.5L5.5 5.5L1.5 9.5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="card">
        <div class="task-row">
          <div class="checkbox mine"></div>
          <div class="task-body">
            <div class="task-name mine">Confirm location permits</div>
            <div class="task-meta">Apr 07</div>
          </div>
        </div>
        <div class="task-row">
          <div class="checkbox mine"></div>
          <div class="task-body">
            <div class="task-name mine">Send call sheet draft</div>
            <div class="task-meta">Apr 09</div>
          </div>
        </div>
        <div class="task-row">
          <div class="checkbox other"></div>
          <div class="task-body">
            <div class="task-name other">Review color grade pass</div>
            <div class="task-meta">Apr 12</div>
            <div class="task-assignee">— Jordan R.</div>
          </div>
        </div>
        <div class="add-fab">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path class="plus-path" d="M5 1V9M1 5H9" stroke="rgba(196,90,220,0.6)" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <!-- EMPTY -->
  <div>
    <div class="state-label">Empty state</div>
    <div class="module">
      <div class="module-header">
        <svg class="module-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
          <circle cx="6.5" cy="6.5" r="5.5" stroke="white" stroke-width="1.2"/>
          <path d="M4 6.5L6 8.5L9 5" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="module-name">Action Items</span>
        <span class="module-meta">ALL CLEAR</span>
        <svg class="module-chevron" width="7" height="11" viewBox="0 0 7 11" fill="none">
          <path d="M1.5 1.5L5.5 5.5L1.5 9.5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="card">
        <div class="empty-body">
          <div class="empty-icon-wrap">
            <div class="pulse-ring"></div>
            <div class="empty-icon-bg"></div>
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path d="M2.5 7.5L6 11L12.5 4" stroke="#c45adc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="empty-headline">All clear, boss.</div>
          <div class="empty-sub">No open items on this one.<br>Enjoy it while it lasts.</div>
        </div>
        <div class="add-fab">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path class="plus-path" d="M5 1V9M1 5H9" stroke="rgba(196,90,220,0.6)" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
