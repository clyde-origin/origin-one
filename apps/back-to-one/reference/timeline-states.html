<!DOCTYPE html>
<html lang="en" style="background:#04040a">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline — States</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#04040a; --card:#0a0a12; --border:rgba(255,255,255,0.05);
  --text:#dddde8; --muted:#62627a;
  --accent:#c45adc; --pre:#e8a020; --prod:#6470f3; --post:#00b894;
  --danger:#e8564a; --r:9px;
  --mono:'SF Mono','Fira Code','Menlo',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
}
body {
  background:#04040a; font-family:var(--sans); color:var(--text);
  display:flex; flex-direction:column; align-items:center;
  padding:28px 0 64px; gap:32px;
}
.hub-frame { width:358px; display:flex; flex-direction:column; gap:40px; }
.state-label { font-family:var(--mono); font-size:0.48rem; color:var(--muted); letter-spacing:0.12em; text-transform:uppercase; margin-bottom:8px; }

.module { display:flex; flex-direction:column; gap:8px; }
.mod-hdr { display:flex; align-items:center; gap:6px; padding:0 2px; }
.mod-icon { opacity:0.45; flex-shrink:0; }
.mod-name { font-weight:700; font-size:0.8rem; color:var(--text); flex:1; }
.mod-meta { font-family:var(--mono); font-size:0.44rem; color:var(--muted); letter-spacing:0.06em; }
.mod-chev { opacity:0.2; flex-shrink:0; }

.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r); padding:12px 12px 0;
  display:flex; flex-direction:column;
  height:168px; position:relative; overflow:visible;
}

/* TRACKS */
.tracks { display:flex; flex-direction:column; gap:4px; margin-bottom:10px; position:relative; }
.track-row { display:flex; align-items:center; gap:6px; }
.track-label {
  font-family:var(--mono); font-size:0.42rem; color:var(--muted);
  letter-spacing:0.06em; text-transform:uppercase;
  width:26px; flex-shrink:0; text-align:right;
}
.track-bar { flex:1; height:4px; background:rgba(255,255,255,0.05); border-radius:2px; position:relative; }
.track-fill { height:100%; border-radius:2px; position:absolute; top:0; }

/* delivery marker — only on the terminal phase track */
.delivery-tick {
  position:absolute;
  top:-3px; bottom:-3px;
  width:1.5px;
  background:var(--danger);
  border-radius:1px;
  right:12%; /* delivery at ~88% */
}
/* tiny dot cap at top */
.delivery-tick::before {
  content:'';
  position:absolute; top:-2px; left:50%; transform:translateX(-50%);
  width:4px; height:4px; border-radius:50%;
  background:var(--danger);
}

/* today line */
.today-line {
  position:absolute; top:0; bottom:0; width:1.5px;
  background:rgba(255,255,255,0.55); border-radius:1px;
  pointer-events:none;
  left:calc(26px + 6px + 55%);
}
.today-line::before {
  content:'today';
  position:absolute; top:-13px; left:50%; transform:translateX(-50%);
  font-family:var(--mono); font-size:0.37rem; color:rgba(255,255,255,0.35);
  white-space:nowrap; letter-spacing:0.05em;
}

/* MILESTONES */
.milestones { display:flex; flex-direction:column; flex:1; overflow:hidden; }
.ms-row {
  display:flex; align-items:center; gap:8px;
  padding:6px 0; border-top:1px solid var(--border); cursor:pointer;
  flex-shrink:0;
}
.ms-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.ms-dot.glow { box-shadow:0 0 7px currentColor; }
.ms-date { font-family:var(--mono); font-size:0.48rem; color:var(--muted); letter-spacing:0.04em; width:34px; flex-shrink:0; }
.ms-name { font-size:0.7rem; font-weight:600; color:var(--text); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ms-name.delivery { color:var(--danger); }
.ms-chev { opacity:0.2; flex-shrink:0; }

/* EMPTY */
.empty-body {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:8px; text-align:center; padding:4px 16px 14px;
}
.empty-headline { font-weight:800; font-size:0.8rem; color:var(--text); letter-spacing:-0.01em; }
.empty-sub { font-family:var(--mono); font-size:0.47rem; color:var(--muted); letter-spacing:0.03em; line-height:1.6; }

/* ADD FAB */
.add-fab {
  position:absolute; bottom:-14px; right:12px;
  width:28px; height:28px; border-radius:50%;
  background:#14101a; border:1.5px solid rgba(196,90,220,0.35);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; z-index:10;
  transition:border-color 0.15s, background 0.15s, transform 0.15s;
}
.add-fab:hover { border-color:rgba(196,90,220,0.8); background:rgba(196,90,220,0.12); transform:scale(1.1); }
.add-fab:hover .pp { stroke:#c45adc; }
.pp { transition:stroke 0.15s; }

@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:0.7} }
</style>
</head>
<body>
<div class="hub-frame">

  <!-- FILLED -->
  <div>
    <div class="state-label">Filled state</div>
    <div class="module">
      <div class="mod-hdr">
        <svg class="mod-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
          <line x1="1" y1="6.5" x2="12" y2="6.5" stroke="white" stroke-width="1.1"/>
          <circle cx="2.5" cy="6.5" r="1.5" fill="white"/>
          <circle cx="6.5" cy="6.5" r="1.5" fill="white"/>
          <circle cx="10.5" cy="6.5" r="1.5" fill="white"/>
        </svg>
        <span class="mod-name">Timeline</span>
        <span class="mod-meta">SHOOT IN 14D</span>
        <svg class="mod-chev" width="7" height="11" viewBox="0 0 7 11" fill="none">
          <path d="M1.5 1.5L5.5 5.5L1.5 9.5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="card">
        <div class="tracks">

          <!-- PRE — no marker -->
          <div class="track-row">
            <span class="track-label">Pre</span>
            <div class="track-bar">
              <div class="track-fill" style="left:0; width:80%; background:var(--pre);"></div>
            </div>
          </div>

          <!-- PROD — no marker (post exists) -->
          <div class="track-row">
            <span class="track-label">Prod</span>
            <div class="track-bar">
              <div class="track-fill" style="left:55%; width:30%; background:var(--prod);"></div>
            </div>
          </div>

          <!-- POST — delivery marker here only -->
          <div class="track-row">
            <span class="track-label">Post</span>
            <div class="track-bar">
              <div class="track-fill" style="left:70%; width:18%; background:var(--post); opacity:0.45;"></div>
              <div class="delivery-tick"></div>
            </div>
          </div>

          <div class="today-line"></div>
        </div>

        <div class="milestones">
          <div class="ms-row">
            <div class="ms-dot glow" style="background:var(--prod); color:var(--prod)"></div>
            <span class="ms-date">Apr 17</span>
            <span class="ms-name">Shoot begins</span>
            <svg class="ms-chev" width="5" height="9" viewBox="0 0 5 9" fill="none"><path d="M1 1L4 4.5L1 8" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="ms-row">
            <div class="ms-dot" style="background:var(--post)"></div>
            <span class="ms-date">May 02</span>
            <span class="ms-name">Picture lock</span>
            <svg class="ms-chev" width="5" height="9" viewBox="0 0 5 9" fill="none"><path d="M1 1L4 4.5L1 8" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="ms-row">
            <div class="ms-dot" style="background:var(--danger)"></div>
            <span class="ms-date">May 20</span>
            <span class="ms-name delivery">Final delivery</span>
            <svg class="ms-chev" width="5" height="9" viewBox="0 0 5 9" fill="none"><path d="M1 1L4 4.5L1 8" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>

        <div class="add-fab">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path class="pp" d="M5 1V9M1 5H9" stroke="rgba(196,90,220,0.5)" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <!-- EMPTY -->
  <div>
    <div class="state-label">Empty state</div>
    <div class="module">
      <div class="mod-hdr">
        <svg class="mod-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
          <line x1="1" y1="6.5" x2="12" y2="6.5" stroke="white" stroke-width="1.1"/>
          <circle cx="2.5" cy="6.5" r="1.5" fill="white"/>
          <circle cx="6.5" cy="6.5" r="1.5" fill="white"/>
          <circle cx="10.5" cy="6.5" r="1.5" fill="white"/>
        </svg>
        <span class="mod-name">Timeline</span>
        <span class="mod-meta">NOT SET</span>
        <svg class="mod-chev" width="7" height="11" viewBox="0 0 7 11" fill="none">
          <path d="M1.5 1.5L5.5 5.5L1.5 9.5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="card">
        <div class="tracks">
          <div class="track-row">
            <span class="track-label" style="opacity:0.3">Pre</span>
            <div class="track-bar"><div class="track-fill" style="left:0;width:100%;background:rgba(232,160,32,0.1);animation:pulse 2.2s ease-in-out infinite;"></div></div>
          </div>
          <div class="track-row">
            <span class="track-label" style="opacity:0.3">Prod</span>
            <div class="track-bar"><div class="track-fill" style="left:0;width:100%;background:rgba(100,112,243,0.1);animation:pulse 2.2s ease-in-out infinite;animation-delay:0.35s;"></div></div>
          </div>
          <div class="track-row">
            <span class="track-label" style="opacity:0.3">Post</span>
            <div class="track-bar"><div class="track-fill" style="left:0;width:100%;background:rgba(0,184,148,0.1);animation:pulse 2.2s ease-in-out infinite;animation-delay:0.7s;"></div></div>
          </div>
        </div>

        <div class="empty-body">
          <div class="empty-headline">The time is now.</div>
          <div class="empty-sub">No dates set yet.<br>Add milestones to start the clock.</div>
        </div>

        <div class="add-fab">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path class="pp" d="M5 1V9M1 5H9" stroke="rgba(196,90,220,0.5)" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
